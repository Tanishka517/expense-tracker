<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PennyPal Dashboard</title>

  <link rel="stylesheet" href="style3.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

   <div style="text-align: right; margin-top: 15px;">
    <a href="analytics.html" style="display: inline-block; background: #FF6B9A; color: white; padding: 10px 20px; border-radius: 50px; text-decoration: none; font-weight: 500; font-size: 0.9rem; transition: 0.3s;">
        View Visual Analytics Reports →
    </a>
</div>
  <main class="container">

    <section class="greeting">
      <h1>
        Hello,
        <span id="username"></span> 👋
      </h1>
    </section>

    <section class="balance-card">
      <h3>Total Balance</h3>
      <h1 id="balance">₹0</h1>
    </section>

    <section class="summary-cards">
      <div class="card">
        <h3>Income</h3>
        <p id="income">₹0</p>
      </div>

      <div class="card">
        <h3>Expenses</h3>
        <p id="expense">₹0</p>
      </div>

      <div class="card">
        <h3>Budget Left</h3>
        <p id="budget">₹0</p>
      </div>
    </section>

    <section class="add-expense">
      <h2>Add Expense</h2>

      <input type="number" id="amount" placeholder="Amount">

      <select id="category">
        <option>Food</option>
        <option>Travel</option>
        <option>Shopping</option>
        <option>Education</option>
        <option>Entertainment</option>
        <option >Health</option>
        <option>Others</option>
      </select>
      
       <input type="text" id="description" placeholder="Description">

      <button id="addBtn">Add Expense</button>
      
      <button id="resetBtn" style="background-color: #e74c3c; margin-top: 10px; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; width: 100%;">
        Reset for New Month
      </button>
    </section>

    <section class="transactions">
      <h2>Transaction History</h2>
      <ul id="expense-list" style="list-style: none; padding: 0; margin-top: 15px;"></ul>
    </section>

  </main>

  <script src="expense.js"></script>
</body>
</html>
